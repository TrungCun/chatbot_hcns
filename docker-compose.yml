services:
  redis:
    image: redis:7-alpine
    container_name: chatbot-hcns-redis
    ports:
      - "127.0.0.1:6380:6379"
    volumes:
      - redis-storage:/data
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  redis-storage:
    driver: local
