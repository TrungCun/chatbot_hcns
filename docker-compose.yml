services:
  redis:
    image: redis:7-alpine
    container_name: chatbot-hcns-redis
    ports:
      - "127.0.0.1:6380:6379"
    volumes:
      - redis-storage:/data
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:latest
    container_name: chatbot-hcns-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant-storage:/qdrant/storage
    restart: unless-stopped

volumes:
  redis-storage:
    driver: local
  qdrant-storage:
    driver: local
